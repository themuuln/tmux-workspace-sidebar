name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Run Python tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Run Codex hook integration test
        run: bash scripts/test-hook-codex.sh

      - name: Run push notification integration test
        run: bash scripts/test-push-notify.sh

      - name: Run tmux smoke test
        run: bash scripts/smoke-test.sh
